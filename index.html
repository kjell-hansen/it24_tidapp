<!DOCTYPE html>
<html lang="sv">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Tidapp</title>
        <link rel="stylesheet" href="css/main.css">
        <link rel="stylesheet" href="css/index.css">
        <script src="js/main.js"></script>
    </head>
    <body>
        <header>
            <h1>Tidsrapportering - Sammanställning</h1>
        </header>
        <nav>
            <ul>
                <li class="aktiv">Sammanställning</li>
                <li><a href="aktiviteter.html">Aktiviteter</a></li>
                <li><a href="uppgifter.html">Uppgifter</a></li>
            </ul>
        </nav>
        <main>
            <p>
                Period:
                <input type="date" id="franDatum" value="2026-01-01"> --
                <input type="date" id="tillDatum" value="2026-06-01">
                <button id="hamta">Hämta data</button>
            </p>
            <ul class="lista heading">
                <li>Aktivitet</li>
                <li class="right">Total tid</li>
            </ul>
            <div id="tom">
                <!--- ul-taggarna nedan ska tas bort och skapas dynamiskt-->
                <ul class="lista">
                    <li>Databas</li>
                    <li class="right">2:15</li>
                </ul>
                <ul class="lista">
                    <li>Planering</li>
                    <li class="right">1:30</li>
                </ul>
                <ul class="lista">
                    <li>Gränssnitt - Aktiviteter</li>
                    <li class="right">4:15</li>
                </ul>
                <ul class="lista">
                    <li>Gränssnitt - Uppgifter</li>
                    <li class="right">3:30</li>
                </ul>
                <ul class="lista">
                    <li>API - Uppgifter</li>
                    <li class="right">1:30</li>
                </ul>
                <!--- Slut på dynamiskt skapad html -->
            </div>
        </main>
        <footer>
            <p>&copy; Kjell Hansen 2026</p>
        </footer>
    </body>
    <script src="./js/main.js"></script>
    <script src="./js/index.js"></script>
</html>
